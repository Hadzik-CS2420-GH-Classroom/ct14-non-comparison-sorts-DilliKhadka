<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 950" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Counting Sort &#x2014; Complete Walkthrough</text>
  <text x="450" y="54" text-anchor="middle" fill="#777" font-size="13">Count occurrences, then place directly. No comparisons needed.</text>

  <!-- Legend -->
  <rect x="660" y="64" width="220" height="48" rx="8" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
  <rect x="675" y="74" width="14" height="14" rx="3" fill="#3498db"/>
  <text x="695" y="86" fill="#333" font-size="11">Input data</text>
  <rect x="675" y="92" width="14" height="14" rx="3" fill="#27ae60"/>
  <text x="695" y="104" fill="#333" font-size="11">Sorted output</text>
  <text x="790" y="86" fill="#333" font-size="11" font-weight="bold">Time: O(n+k)</text>
  <text x="790" y="104" fill="#333" font-size="11" font-weight="bold">Space: O(k)</text>

  <!-- Input -->
  <text x="30" y="90" fill="#1a1a1a" font-size="15" font-weight="bold">Input:</text>
  <rect x="100" y="72" width="42" height="28" rx="4" fill="#3498db"/><text x="121" y="91" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">14</text>
  <rect x="148" y="72" width="42" height="28" rx="4" fill="#3498db"/><text x="169" y="91" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">12</text>
  <rect x="196" y="72" width="42" height="28" rx="4" fill="#3498db"/><text x="217" y="91" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">17</text>
  <rect x="244" y="72" width="42" height="28" rx="4" fill="#3498db"/><text x="265" y="91" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">11</text>
  <rect x="292" y="72" width="42" height="28" rx="4" fill="#3498db"/><text x="313" y="91" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">14</text>
  <rect x="340" y="72" width="42" height="28" rx="4" fill="#3498db"/><text x="361" y="91" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">12</text>

  <!-- ===== STEP 1a: Find min and max ===== -->
  <rect x="20" y="118" width="860" height="50" rx="8" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="35" y="140" fill="#1565c0" font-size="14" font-weight="bold">Step 1a: Find min and max</text>
  <text x="260" y="140" fill="#888" font-size="11">Scan all n elements once: O(n)</text>
  <text x="35" y="158" fill="#555" font-size="12">Scan: 14, 12, 17, 11, 14, 12</text>
  <rect x="460" y="130" width="230" height="28" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="470" y="149" fill="#0d47a1" font-size="12">min=<tspan font-weight="bold">11</tspan>, max=<tspan font-weight="bold">17</tspan>, k = 17-11+1 = <tspan font-weight="bold" fill="#c62828">7</tspan></text>

  <!-- ===== STEP 1b: Allocate count array ===== -->
  <rect x="20" y="178" width="860" height="84" rx="8" fill="#fff" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="35" y="200" fill="#2e7d32" font-size="14" font-weight="bold">Step 1b: Allocate count array</text>
  <text x="280" y="200" fill="#888" font-size="11">Size k = 7, all zeros. Index i represents value (min + i).</text>

  <!-- Value labels -->
  <text x="35" y="224" fill="#555" font-size="10">Value:</text>
  <text x="121" y="224" text-anchor="middle" fill="#555" font-size="10">11</text>
  <text x="169" y="224" text-anchor="middle" fill="#555" font-size="10">12</text>
  <text x="217" y="224" text-anchor="middle" fill="#555" font-size="10">13</text>
  <text x="265" y="224" text-anchor="middle" fill="#555" font-size="10">14</text>
  <text x="313" y="224" text-anchor="middle" fill="#555" font-size="10">15</text>
  <text x="361" y="224" text-anchor="middle" fill="#555" font-size="10">16</text>
  <text x="409" y="224" text-anchor="middle" fill="#555" font-size="10">17</text>

  <!-- Empty count array -->
  <text x="35" y="244" fill="#555" font-size="10">Count:</text>
  <rect x="100" y="228" width="42" height="24" rx="4" fill="#f5f5f5" stroke="#bdc3c7" stroke-width="1"/><text x="121" y="245" text-anchor="middle" fill="#bbb" font-size="12">0</text>
  <rect x="148" y="228" width="42" height="24" rx="4" fill="#f5f5f5" stroke="#bdc3c7" stroke-width="1"/><text x="169" y="245" text-anchor="middle" fill="#bbb" font-size="12">0</text>
  <rect x="196" y="228" width="42" height="24" rx="4" fill="#f5f5f5" stroke="#bdc3c7" stroke-width="1"/><text x="217" y="245" text-anchor="middle" fill="#bbb" font-size="12">0</text>
  <rect x="244" y="228" width="42" height="24" rx="4" fill="#f5f5f5" stroke="#bdc3c7" stroke-width="1"/><text x="265" y="245" text-anchor="middle" fill="#bbb" font-size="12">0</text>
  <rect x="292" y="228" width="42" height="24" rx="4" fill="#f5f5f5" stroke="#bdc3c7" stroke-width="1"/><text x="313" y="245" text-anchor="middle" fill="#bbb" font-size="12">0</text>
  <rect x="340" y="228" width="42" height="24" rx="4" fill="#f5f5f5" stroke="#bdc3c7" stroke-width="1"/><text x="361" y="245" text-anchor="middle" fill="#bbb" font-size="12">0</text>
  <rect x="388" y="228" width="42" height="24" rx="4" fill="#f5f5f5" stroke="#bdc3c7" stroke-width="1"/><text x="409" y="245" text-anchor="middle" fill="#bbb" font-size="12">0</text>
  <text x="460" y="244" fill="#8e44ad" font-size="11" font-weight="bold">Index formula: count[value - min]</text>

  <!-- ===== STEP 1c: Tally (scan input, increment counts) ===== -->
  <rect x="20" y="272" width="860" height="248" rx="8" fill="#fff" stroke="#e65100" stroke-width="1.5"/>
  <text x="35" y="294" fill="#e65100" font-size="14" font-weight="bold">Step 1c: Tally</text>
  <text x="145" y="294" fill="#888" font-size="11">Scan input left to right. For each element: index = value - min, then count[index]++</text>

  <!-- Column headers -->
  <text x="40"  y="314" fill="#555" font-size="10" font-weight="bold">Element</text>
  <text x="120" y="314" fill="#555" font-size="10" font-weight="bold">index = value - min</text>
  <text x="310" y="314" fill="#555" font-size="10" font-weight="bold">Action</text>
  <text x="530" y="314" fill="#555" font-size="10" font-weight="bold">Count array after</text>

  <!-- Row 1: process 14 -->
  <text x="40"  y="336" fill="#3498db" font-size="12" font-weight="bold">14</text>
  <text x="120" y="336" fill="#555" font-size="12">14 - 11 = <tspan fill="#e65100" font-weight="bold">3</tspan></text>
  <text x="310" y="336" fill="#555" font-size="12">count[<tspan fill="#e65100" font-weight="bold">3</tspan>]: 0 &#x2192; 1</text>
  <text x="530" y="336" fill="#888" font-size="11">[0, 0, 0, <tspan fill="#e65100" font-weight="bold">1</tspan>, 0, 0, 0]</text>

  <!-- Row 2: process 12 -->
  <text x="40"  y="360" fill="#3498db" font-size="12" font-weight="bold">12</text>
  <text x="120" y="360" fill="#555" font-size="12">12 - 11 = <tspan fill="#e65100" font-weight="bold">1</tspan></text>
  <text x="310" y="360" fill="#555" font-size="12">count[<tspan fill="#e65100" font-weight="bold">1</tspan>]: 0 &#x2192; 1</text>
  <text x="530" y="360" fill="#888" font-size="11">[0, <tspan fill="#e65100" font-weight="bold">1</tspan>, 0, 1, 0, 0, 0]</text>

  <!-- Row 3: process 17 -->
  <text x="40"  y="384" fill="#3498db" font-size="12" font-weight="bold">17</text>
  <text x="120" y="384" fill="#555" font-size="12">17 - 11 = <tspan fill="#e65100" font-weight="bold">6</tspan></text>
  <text x="310" y="384" fill="#555" font-size="12">count[<tspan fill="#e65100" font-weight="bold">6</tspan>]: 0 &#x2192; 1</text>
  <text x="530" y="384" fill="#888" font-size="11">[0, 1, 0, 1, 0, 0, <tspan fill="#e65100" font-weight="bold">1</tspan>]</text>

  <!-- Row 4: process 11 -->
  <text x="40"  y="408" fill="#3498db" font-size="12" font-weight="bold">11</text>
  <text x="120" y="408" fill="#555" font-size="12">11 - 11 = <tspan fill="#e65100" font-weight="bold">0</tspan></text>
  <text x="310" y="408" fill="#555" font-size="12">count[<tspan fill="#e65100" font-weight="bold">0</tspan>]: 0 &#x2192; 1</text>
  <text x="530" y="408" fill="#888" font-size="11">[<tspan fill="#e65100" font-weight="bold">1</tspan>, 1, 0, 1, 0, 0, 1]</text>

  <!-- Row 5: process 14 (duplicate) -->
  <text x="40"  y="432" fill="#3498db" font-size="12" font-weight="bold">14</text>
  <text x="120" y="432" fill="#555" font-size="12">14 - 11 = <tspan fill="#e65100" font-weight="bold">3</tspan></text>
  <text x="310" y="432" fill="#8e44ad" font-size="12">count[<tspan fill="#e65100" font-weight="bold">3</tspan>]: 1 &#x2192; <tspan font-weight="bold">2</tspan></text>
  <text x="530" y="432" fill="#888" font-size="11">[1, 1, 0, <tspan fill="#e65100" font-weight="bold">2</tspan>, 0, 0, 1]</text>
  <text x="760" y="432" fill="#8e44ad" font-size="10">duplicate!</text>

  <!-- Row 6: process 12 (duplicate) -->
  <text x="40"  y="456" fill="#3498db" font-size="12" font-weight="bold">12</text>
  <text x="120" y="456" fill="#555" font-size="12">12 - 11 = <tspan fill="#e65100" font-weight="bold">1</tspan></text>
  <text x="310" y="456" fill="#8e44ad" font-size="12">count[<tspan fill="#e65100" font-weight="bold">1</tspan>]: 1 &#x2192; <tspan font-weight="bold">2</tspan></text>
  <text x="530" y="456" fill="#888" font-size="11">[1, <tspan fill="#e65100" font-weight="bold">2</tspan>, 0, 2, 0, 0, 1]</text>
  <text x="760" y="456" fill="#8e44ad" font-size="10">duplicate!</text>

  <!-- Final count array visual -->
  <text x="35" y="488" fill="#2e7d32" font-size="11" font-weight="bold">Final:</text>
  <!-- Value labels above -->
  <text x="121" y="482" text-anchor="middle" fill="#555" font-size="10">11</text>
  <text x="169" y="482" text-anchor="middle" fill="#555" font-size="10">12</text>
  <text x="217" y="482" text-anchor="middle" fill="#555" font-size="10">13</text>
  <text x="265" y="482" text-anchor="middle" fill="#555" font-size="10">14</text>
  <text x="313" y="482" text-anchor="middle" fill="#555" font-size="10">15</text>
  <text x="361" y="482" text-anchor="middle" fill="#555" font-size="10">16</text>
  <text x="409" y="482" text-anchor="middle" fill="#555" font-size="10">17</text>
  <!-- Count boxes -->
  <rect x="100" y="486" width="42" height="24" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/><text x="121" y="503" text-anchor="middle" fill="#2e7d32" font-size="12" font-weight="bold">1</text>
  <rect x="148" y="486" width="42" height="24" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/><text x="169" y="503" text-anchor="middle" fill="#2e7d32" font-size="12" font-weight="bold">2</text>
  <rect x="196" y="486" width="42" height="24" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/><text x="217" y="503" text-anchor="middle" fill="#2e7d32" font-size="12" font-weight="bold">0</text>
  <rect x="244" y="486" width="42" height="24" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/><text x="265" y="503" text-anchor="middle" fill="#2e7d32" font-size="12" font-weight="bold">2</text>
  <rect x="292" y="486" width="42" height="24" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/><text x="313" y="503" text-anchor="middle" fill="#2e7d32" font-size="12" font-weight="bold">0</text>
  <rect x="340" y="486" width="42" height="24" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/><text x="361" y="503" text-anchor="middle" fill="#2e7d32" font-size="12" font-weight="bold">0</text>
  <rect x="388" y="486" width="42" height="24" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/><text x="409" y="503" text-anchor="middle" fill="#2e7d32" font-size="12" font-weight="bold">1</text>

  <!-- ===== STEP 2: Place elements ===== -->
  <rect x="20" y="530" width="860" height="160" rx="8" fill="#fff" stroke="#4527a0" stroke-width="1.5"/>
  <text x="35" y="552" fill="#4527a0" font-size="14" font-weight="bold">Step 2: Place elements using counts</text>
  <text x="330" y="552" fill="#888" font-size="11">Walk the count array left to right, placing each value count[i] times. O(n + k)</text>

  <text x="35" y="580" fill="#555" font-size="12">count[0]=1 &#x2192; place one 11</text>
  <rect x="300" y="566" width="42" height="24" rx="4" fill="#27ae60"/><text x="321" y="583" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">11</text>

  <text x="35" y="606" fill="#555" font-size="12">count[1]=2 &#x2192; place two 12s</text>
  <rect x="300" y="592" width="42" height="24" rx="4" fill="#27ae60"/><text x="321" y="609" text-anchor="middle" fill="#fff" font-size="12">11</text>
  <rect x="348" y="592" width="42" height="24" rx="4" fill="#27ae60"/><text x="369" y="609" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">12</text>
  <rect x="396" y="592" width="42" height="24" rx="4" fill="#27ae60"/><text x="417" y="609" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">12</text>

  <text x="35" y="632" fill="#555" font-size="12">count[2]=0 skip, count[3]=2 place two 14s, count[4,5]=0 skip, count[6]=1 place one 17</text>
  <rect x="300" y="640" width="42" height="24" rx="4" fill="#27ae60"/><text x="321" y="657" text-anchor="middle" fill="#fff" font-size="12">11</text>
  <rect x="348" y="640" width="42" height="24" rx="4" fill="#27ae60"/><text x="369" y="657" text-anchor="middle" fill="#fff" font-size="12">12</text>
  <rect x="396" y="640" width="42" height="24" rx="4" fill="#27ae60"/><text x="417" y="657" text-anchor="middle" fill="#fff" font-size="12">12</text>
  <rect x="444" y="640" width="42" height="24" rx="4" fill="#27ae60"/><text x="465" y="657" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">14</text>
  <rect x="492" y="640" width="42" height="24" rx="4" fill="#27ae60"/><text x="513" y="657" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">14</text>
  <rect x="540" y="640" width="42" height="24" rx="4" fill="#27ae60"/><text x="561" y="657" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">17</text>
  <text x="600" y="657" fill="#27ae60" font-size="12" font-weight="bold">&#x2190; done!</text>

  <!-- ===== RESULT ===== -->
  <rect x="20" y="704" width="860" height="56" rx="8" fill="#fff" stroke="#27ae60" stroke-width="2"/>
  <text x="35" y="728" fill="#27ae60" font-size="14" font-weight="bold">Result:</text>
  <rect x="100" y="714" width="42" height="28" rx="4" fill="#27ae60"/><text x="121" y="733" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">11</text>
  <rect x="148" y="714" width="42" height="28" rx="4" fill="#27ae60"/><text x="169" y="733" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">12</text>
  <rect x="196" y="714" width="42" height="28" rx="4" fill="#27ae60"/><text x="217" y="733" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">12</text>
  <rect x="244" y="714" width="42" height="28" rx="4" fill="#27ae60"/><text x="265" y="733" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">14</text>
  <rect x="292" y="714" width="42" height="28" rx="4" fill="#27ae60"/><text x="313" y="733" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">14</text>
  <rect x="340" y="714" width="42" height="28" rx="4" fill="#27ae60"/><text x="361" y="733" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">17</text>
  <text x="400" y="733" fill="#27ae60" font-size="12" font-weight="bold">&#x2190; sorted! Zero comparisons.</text>

  <!-- ===== KEY TAKEAWAYS ===== -->
  <rect x="20" y="776" width="860" height="160" rx="10" fill="#f4ecf7" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="450" y="800" text-anchor="middle" fill="#1a1a2e" font-size="16" font-weight="bold">Key Takeaways</text>
  <text x="40" y="824" fill="#333" font-size="12">&#x2022; <tspan font-weight="bold">Three passes over the data:</tspan> (1) find min/max O(n), (2) tally counts O(n), (3) place elements O(n+k). Total: O(n + k).</text>
  <text x="40" y="846" fill="#333" font-size="12">&#x2022; No element-to-element comparisons &#x2014; just count and place. That&#x2019;s how it beats the O(n log n) lower bound.</text>
  <text x="40" y="868" fill="#333" font-size="12">&#x2022; <tspan font-weight="bold">k depends on the range</tspan> (max - min + 1), not max itself. Here k = 7, not 17. Offset by min to save space.</text>
  <text x="40" y="890" fill="#333" font-size="12">&#x2022; Space is O(k) for the count array. If k is huge (e.g., sorting 100 values with range = 1 billion), counting sort wastes memory.</text>
  <text x="40" y="912" fill="#333" font-size="12">&#x2022; When k is much smaller than n (small range, many elements), this is essentially O(n) &#x2014; much faster than any comparison sort.</text>
</svg>
