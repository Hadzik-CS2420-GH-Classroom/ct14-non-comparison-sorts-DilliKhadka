<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 976" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Bucket Sort &#x2014; Complete Walkthrough</text>
  <text x="450" y="54" text-anchor="middle" fill="#777" font-size="13">Distribute into range-based buckets, sort each bucket, concatenate.</text>

  <!-- Legend -->
  <rect x="660" y="64" width="220" height="48" rx="8" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
  <text x="680" y="82" fill="#333" font-size="11" font-weight="bold">Time: O(n+k) avg</text>
  <text x="680" y="100" fill="#333" font-size="11" font-weight="bold">Space: O(n+k)</text>
  <text x="800" y="82" fill="#e74c3c" font-size="11" font-weight="bold">Worst: O(n&#xB2;)</text>
  <text x="800" y="100" fill="#888" font-size="11">(all in 1 bucket)</text>

  <!-- Input -->
  <text x="30" y="90" fill="#1a1a1a" font-size="15" font-weight="bold">Input:</text>
  <rect x="100" y="72" width="42" height="28" rx="4" fill="#1565c0"/><text x="121" y="91" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">42</text>
  <rect x="148" y="72" width="42" height="28" rx="4" fill="#1565c0"/><text x="169" y="91" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">15</text>
  <rect x="196" y="72" width="42" height="28" rx="4" fill="#1565c0"/><text x="217" y="91" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">73</text>
  <rect x="244" y="72" width="42" height="28" rx="4" fill="#1565c0"/><text x="265" y="91" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">28</text>
  <rect x="292" y="72" width="42" height="28" rx="4" fill="#1565c0"/><text x="313" y="91" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">91</text>
  <rect x="340" y="72" width="42" height="28" rx="4" fill="#1565c0"/><text x="361" y="91" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">5</text>

  <!-- ===== STEP 1a: Find min, max, choose bucket count ===== -->
  <rect x="20" y="118" width="860" height="108" rx="8" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="35" y="140" fill="#1565c0" font-size="14" font-weight="bold">Step 1a: Find min, max, and choose bucket count</text>
  <text x="400" y="140" fill="#888" font-size="11">Scan all n elements once: O(n)</text>

  <text x="35" y="160" fill="#555" font-size="12">Scan: 42, 15, 73, 28, 91, 5</text>
  <rect x="310" y="146" width="540" height="28" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="320" y="165" fill="#0d47a1" font-size="12">min=<tspan font-weight="bold">5</tspan>, max=<tspan font-weight="bold">91</tspan>, range_per_bucket = ceil((91-5+1)/3) = <tspan font-weight="bold" fill="#c62828">29</tspan></text>
  <text x="35" y="184" fill="#8e44ad" font-size="11" font-weight="bold">Bucket ranges: [5-33], [34-62], [63-91]</text>

  <text x="35" y="202" fill="#555" font-size="11">num_buckets = <tspan font-weight="bold">3</tspan> (chosen by the programmer). More buckets = better distribution but more memory.</text>
  <text x="35" y="216" fill="#555" font-size="11">Fewer buckets = less memory but bigger buckets to sort. Common choices: n, sqrt(n), or a fixed number like 10.</text>

  <!-- ===== STEP 1b: Distribute element by element ===== -->
  <rect x="20" y="236" width="860" height="260" rx="8" fill="#fff" stroke="#e65100" stroke-width="1.5"/>
  <text x="35" y="258" fill="#e65100" font-size="14" font-weight="bold">Step 1b: Distribute into buckets</text>
  <text x="280" y="258" fill="#888" font-size="11">For each element: bucket_index = (value - min) / range_per_bucket. O(n)</text>

  <!-- Column headers -->
  <text x="40"  y="280" fill="#555" font-size="10" font-weight="bold">Element</text>
  <text x="120" y="280" fill="#555" font-size="10" font-weight="bold">Formula</text>
  <text x="370" y="280" fill="#555" font-size="10" font-weight="bold">Result</text>
  <text x="530" y="280" fill="#555" font-size="10" font-weight="bold">Bucket</text>

  <!-- Row 1: 42 -->
  <text x="40"  y="300" fill="#1565c0" font-size="12" font-weight="bold">42</text>
  <text x="120" y="300" fill="#555" font-size="12">(42 - 5) / 29 = 37 / 29 = <tspan fill="#e65100" font-weight="bold">1</tspan></text>
  <text x="370" y="300" fill="#e65100" font-size="12">Bucket <tspan font-weight="bold">1</tspan> (34-62)</text>
  <text x="530" y="300" fill="#888" font-size="11">B0: [] B1: [42] B2: []</text>

  <!-- Row 2: 15 -->
  <text x="40"  y="322" fill="#1565c0" font-size="12" font-weight="bold">15</text>
  <text x="120" y="322" fill="#555" font-size="12">(15 - 5) / 29 = 10 / 29 = <tspan fill="#e65100" font-weight="bold">0</tspan></text>
  <text x="370" y="322" fill="#e65100" font-size="12">Bucket <tspan font-weight="bold">0</tspan> (5-33)</text>
  <text x="530" y="322" fill="#888" font-size="11">B0: [15] B1: [42] B2: []</text>

  <!-- Row 3: 73 -->
  <text x="40"  y="344" fill="#1565c0" font-size="12" font-weight="bold">73</text>
  <text x="120" y="344" fill="#555" font-size="12">(73 - 5) / 29 = 68 / 29 = <tspan fill="#e65100" font-weight="bold">2</tspan></text>
  <text x="370" y="344" fill="#e65100" font-size="12">Bucket <tspan font-weight="bold">2</tspan> (63-91)</text>
  <text x="530" y="344" fill="#888" font-size="11">B0: [15] B1: [42] B2: [73]</text>

  <!-- Row 4: 28 -->
  <text x="40"  y="366" fill="#1565c0" font-size="12" font-weight="bold">28</text>
  <text x="120" y="366" fill="#555" font-size="12">(28 - 5) / 29 = 23 / 29 = <tspan fill="#e65100" font-weight="bold">0</tspan></text>
  <text x="370" y="366" fill="#e65100" font-size="12">Bucket <tspan font-weight="bold">0</tspan> (5-33)</text>
  <text x="530" y="366" fill="#888" font-size="11">B0: [15, 28] B1: [42] B2: [73]</text>

  <!-- Row 5: 91 -->
  <text x="40"  y="388" fill="#1565c0" font-size="12" font-weight="bold">91</text>
  <text x="120" y="388" fill="#555" font-size="12">(91 - 5) / 29 = 86 / 29 = <tspan fill="#e65100" font-weight="bold">2</tspan></text>
  <text x="370" y="388" fill="#e65100" font-size="12">Bucket <tspan font-weight="bold">2</tspan> (63-91)</text>
  <text x="530" y="388" fill="#888" font-size="11">B0: [15, 28] B1: [42] B2: [73, 91]</text>

  <!-- Row 6: 5 -->
  <text x="40"  y="410" fill="#1565c0" font-size="12" font-weight="bold">5</text>
  <text x="120" y="410" fill="#555" font-size="12">(5 - 5) / 29 = 0 / 29 = <tspan fill="#e65100" font-weight="bold">0</tspan></text>
  <text x="370" y="410" fill="#e65100" font-size="12">Bucket <tspan font-weight="bold">0</tspan> (5-33)</text>
  <text x="530" y="410" fill="#888" font-size="11">B0: [15, 28, 5] B1: [42] B2: [73, 91]</text>

  <!-- Visual: filled buckets -->
  <text x="35" y="432" fill="#1565c0" font-size="11" font-weight="bold">After distribution:</text>

  <rect x="40" y="438" width="250" height="46" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="50" y="454" fill="#1565c0" font-size="11" font-weight="bold">Bucket 0 (5-33):</text>
  <rect x="160" y="446" width="34" height="24" rx="4" fill="#1565c0"/><text x="177" y="463" text-anchor="middle" fill="#fff" font-size="11">15</text>
  <rect x="198" y="446" width="34" height="24" rx="4" fill="#1565c0"/><text x="215" y="463" text-anchor="middle" fill="#fff" font-size="11">28</text>
  <rect x="236" y="446" width="34" height="24" rx="4" fill="#1565c0"/><text x="253" y="463" text-anchor="middle" fill="#fff" font-size="11">5</text>

  <rect x="320" y="438" width="250" height="46" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="330" y="454" fill="#1565c0" font-size="11" font-weight="bold">Bucket 1 (34-62):</text>
  <rect x="455" y="446" width="34" height="24" rx="4" fill="#1565c0"/><text x="472" y="463" text-anchor="middle" fill="#fff" font-size="11">42</text>

  <rect x="600" y="438" width="250" height="46" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="610" y="454" fill="#1565c0" font-size="11" font-weight="bold">Bucket 2 (63-91):</text>
  <rect x="740" y="446" width="34" height="24" rx="4" fill="#1565c0"/><text x="757" y="463" text-anchor="middle" fill="#fff" font-size="11">73</text>
  <rect x="778" y="446" width="34" height="24" rx="4" fill="#1565c0"/><text x="795" y="463" text-anchor="middle" fill="#fff" font-size="11">91</text>

  <!-- ===== STEP 2: Sort each bucket ===== -->
  <rect x="20" y="498" width="860" height="100" rx="8" fill="#fff" stroke="#e65100" stroke-width="1.5"/>
  <text x="35" y="520" fill="#e65100" font-size="14" font-weight="bold">Step 2: Sort each bucket</text>
  <text x="260" y="520" fill="#888" font-size="11">Insertion sort on each bucket. O(n&#xB2;/k) total -- k buckets, each ~n/k elements. When k is close to n, this is ~O(n).</text>

  <rect x="40" y="534" width="250" height="46" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="50" y="550" fill="#e65100" font-size="11" font-weight="bold">Bucket 0 sorted:</text>
  <rect x="160" y="542" width="34" height="24" rx="4" fill="#e65100"/><text x="177" y="559" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">5</text>
  <rect x="198" y="542" width="34" height="24" rx="4" fill="#e65100"/><text x="215" y="559" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">15</text>
  <rect x="236" y="542" width="34" height="24" rx="4" fill="#e65100"/><text x="253" y="559" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">28</text>

  <rect x="320" y="534" width="250" height="46" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="330" y="550" fill="#e65100" font-size="11" font-weight="bold">Bucket 1 sorted:</text>
  <rect x="455" y="542" width="34" height="24" rx="4" fill="#e65100"/><text x="472" y="559" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">42</text>

  <rect x="600" y="534" width="250" height="46" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="610" y="550" fill="#e65100" font-size="11" font-weight="bold">Bucket 2 sorted:</text>
  <rect x="740" y="542" width="34" height="24" rx="4" fill="#e65100"/><text x="757" y="559" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">73</text>
  <rect x="778" y="542" width="34" height="24" rx="4" fill="#e65100"/><text x="795" y="559" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">91</text>

  <!-- ===== STEP 3: Concatenate ===== -->
  <rect x="20" y="612" width="860" height="70" rx="8" fill="#fff" stroke="#27ae60" stroke-width="2"/>
  <text x="35" y="634" fill="#27ae60" font-size="14" font-weight="bold">Step 3: Concatenate all buckets</text>
  <text x="310" y="634" fill="#888" font-size="11">Append Bucket 0 + Bucket 1 + Bucket 2 into output. O(n)</text>
  <rect x="100" y="642" width="42" height="28" rx="4" fill="#27ae60"/><text x="121" y="661" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">5</text>
  <rect x="148" y="642" width="42" height="28" rx="4" fill="#27ae60"/><text x="169" y="661" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">15</text>
  <rect x="196" y="642" width="42" height="28" rx="4" fill="#27ae60"/><text x="217" y="661" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">28</text>
  <rect x="244" y="642" width="42" height="28" rx="4" fill="#27ae60"/><text x="265" y="661" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">42</text>
  <rect x="292" y="642" width="42" height="28" rx="4" fill="#27ae60"/><text x="313" y="661" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">73</text>
  <rect x="340" y="642" width="42" height="28" rx="4" fill="#27ae60"/><text x="361" y="661" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">91</text>
  <text x="400" y="661" fill="#27ae60" font-size="12" font-weight="bold">&#x2190; sorted!</text>

  <!-- ===== KEY TAKEAWAYS ===== -->
  <rect x="20" y="698" width="860" height="262" rx="10" fill="#f4ecf7" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="450" y="724" text-anchor="middle" fill="#1a1a2e" font-size="16" font-weight="bold">Key Takeaways</text>
  <text x="40" y="750" fill="#333" font-size="12">&#x2022; <tspan font-weight="bold">Three steps:</tspan> (1a) find range + choose buckets O(n), (1b) distribute O(n), (2) sort each bucket O(n&#xB2;/k), (3) concatenate O(n).</text>
  <text x="40" y="774" fill="#333" font-size="12">&#x2022; <tspan font-weight="bold">Total: O(n + k)</tspan> average when data distributes evenly. k = number of buckets.</text>
  <text x="40" y="798" fill="#333" font-size="12">&#x2022; <tspan font-weight="bold" fill="#e74c3c">Worst case O(n&#xB2;):</tspan> if all elements land in one bucket, you end up running insertion sort on the whole array.</text>
  <text x="40" y="822" fill="#333" font-size="12">&#x2022; <tspan font-weight="bold">Why insertion sort?</tspan> Buckets are small (2-3 elements each). Insertion sort is O(n&#xB2;) but on tiny arrays that is just a few operations.</text>
  <text x="40" y="846" fill="#333" font-size="12">&#x2022; <tspan font-weight="bold">Bucket index formula:</tspan> (value - min) / range_per_bucket. Integer division gives the bucket number directly.</text>
  <text x="40" y="870" fill="#333" font-size="12">&#x2022; Works best when data is <tspan font-weight="bold">uniformly distributed</tspan> across a known range. Clustered data fills one bucket and degrades to O(n&#xB2;).</text>
  <text x="40" y="894" fill="#333" font-size="12">&#x2022; <tspan font-weight="bold">Stability depends on the per-bucket sort.</tspan> Bucket sort itself just distributes and concatenates.</text>
  <text x="52" y="912" fill="#333" font-size="12">Use insertion sort (stable) inside each bucket = bucket sort is stable. Use an unstable sort = unstable.</text>
  <text x="40" y="936" fill="#333" font-size="12">&#x2022; <tspan font-weight="bold">vs counting sort:</tspan> counting sort needs k = value range (can be huge). Bucket sort only needs k = number of buckets (you choose).</text>
</svg>
