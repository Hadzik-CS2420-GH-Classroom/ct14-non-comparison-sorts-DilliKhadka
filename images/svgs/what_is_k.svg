<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="430" y="30" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">What Is k? The Value Range</text>
  <text x="430" y="52" text-anchor="middle" fill="#555" font-size="13">Non-comparison sorts are O(n + k). Whether that beats O(n log n) depends entirely on k.</text>

  <!-- Definition box -->
  <rect x="30" y="68" width="800" height="68" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="430" y="92" text-anchor="middle" fill="#0d47a1" font-size="15" font-weight="bold">k = the range of possible values in the input</text>
  <text x="430" y="114" text-anchor="middle" fill="#1565c0" font-size="13">For counting sort: k = (max value - min value + 1). You allocate an array of size k.</text>
  <text x="430" y="130" text-anchor="middle" fill="#1565c0" font-size="13">For bucket sort: k = number of buckets. For radix sort: k = base (usually 10).</text>

  <!-- Good case -->
  <rect x="30" y="150" width="390" height="170" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="225" y="174" text-anchor="middle" fill="#1b5e20" font-size="14" font-weight="bold">Good: k is small relative to n</text>

  <text x="50" y="200" fill="#333" font-size="12">Example: sort 10,000 exam scores (0-100)</text>
  <text x="50" y="220" fill="#555" font-size="12">n = 10,000 entries</text>
  <text x="50" y="238" fill="#2e7d32" font-size="13" font-weight="bold">k = 101 (values 0 through 100)</text>
  <text x="50" y="258" fill="#555" font-size="12">Count array: 101 slots (tiny!)</text>
  <text x="50" y="278" fill="#555" font-size="12">Time: O(10,000 + 101) = O(n)</text>
  <text x="50" y="298" fill="#2e7d32" font-size="12" font-weight="bold">Faster than O(n log n) comparison sorts</text>

  <!-- Bad case -->
  <rect x="440" y="150" width="390" height="170" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <text x="635" y="174" text-anchor="middle" fill="#b71c1c" font-size="14" font-weight="bold">Bad: k is huge relative to n</text>

  <text x="460" y="200" fill="#333" font-size="12">Example: sort 100 Social Security numbers</text>
  <text x="460" y="220" fill="#555" font-size="12">n = 100 entries</text>
  <text x="460" y="238" fill="#c62828" font-size="13" font-weight="bold">k = 999,999,999 (9-digit range)</text>
  <text x="460" y="258" fill="#555" font-size="12">Count array: 1 BILLION slots!</text>
  <text x="460" y="278" fill="#555" font-size="12">Time: O(100 + 999,999,999) = O(k)</text>
  <text x="460" y="298" fill="#c62828" font-size="12" font-weight="bold">Way slower than O(n log n). Use quick sort.</text>

  <!-- Visual: small k -->
  <text x="225" y="340" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">Count array for k = 101</text>
  <rect x="50" y="348" width="350" height="24" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="1"/>
  <text x="225" y="365" text-anchor="middle" fill="#fff" font-size="11">101 slots (fits in a few hundred bytes)</text>

  <!-- Visual: huge k -->
  <text x="635" y="340" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">Count array for k = 999,999,999</text>
  <rect x="460" y="348" width="370" height="24" rx="4" fill="#e74c3c" stroke="#c0392b" stroke-width="1"/>
  <text x="645" y="365" text-anchor="middle" fill="#fff" font-size="11">~4 GB of memory for 100 elements!</text>

  <!-- Decision rule -->
  <rect x="30" y="390" width="800" height="120" rx="8" fill="#f4f6f7" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="430" y="414" text-anchor="middle" fill="#333" font-size="14" font-weight="bold">The Rule: use non-comparison sorts when k is manageable</text>

  <rect x="60" y="426" width="340" height="36" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
  <text x="230" y="449" text-anchor="middle" fill="#1b5e20" font-size="12" font-weight="bold">k is small or similar to n</text>

  <text x="420" y="449" text-anchor="middle" fill="#555" font-size="18">vs</text>

  <rect x="460" y="426" width="340" height="36" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1"/>
  <text x="630" y="449" text-anchor="middle" fill="#b71c1c" font-size="12" font-weight="bold">k is much larger than n</text>

  <text x="230" y="478" text-anchor="middle" fill="#2e7d32" font-size="12">Counting/bucket sort: O(n + k) beats O(n log n)</text>
  <text x="630" y="478" text-anchor="middle" fill="#c62828" font-size="12">Stick with quick sort or merge sort: O(n log n)</text>

  <text x="430" y="504" text-anchor="middle" fill="#888" font-size="12" font-style="italic">Radix sort sidesteps this: k = base (10), so it depends on d (digits) instead. O(d(n+10)) is great when d is small.</text>
</svg>
