<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 780" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">All 9 Sorting Algorithms: When to Use Each</text>
  <text x="450" y="52" text-anchor="middle" fill="#555" font-size="13">Pick the right sort based on your data type, size, and constraints.</text>

  <!-- O(n^2) header -->
  <rect x="20" y="68" width="860" height="26" rx="6" fill="#c62828"/>
  <text x="450" y="87" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">O(n&#xB2;) Quadratic Sorts &#x2014; simple, small data only</text>

  <!-- Bubble -->
  <rect x="20" y="98" width="280" height="100" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="1"/>
  <text x="160" y="118" text-anchor="middle" fill="#c62828" font-size="14" font-weight="bold">Bubble Sort</text>
  <text x="30" y="138" fill="#555" font-size="11">Best/Avg/Worst: O(n) / O(n&#xB2;) / O(n&#xB2;)</text>
  <text x="30" y="154" fill="#555" font-size="11">Space: O(1) | Stable: Yes</text>
  <text x="30" y="174" fill="#2e7d32" font-size="11" font-weight="bold">Use when: teaching, detecting if data</text>
  <text x="30" y="188" fill="#2e7d32" font-size="11" font-weight="bold">is already sorted (early exit)</text>

  <!-- Insertion -->
  <rect x="310" y="98" width="280" height="100" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="1"/>
  <text x="450" y="118" text-anchor="middle" fill="#c62828" font-size="14" font-weight="bold">Insertion Sort</text>
  <text x="320" y="138" fill="#555" font-size="11">Best/Avg/Worst: O(n) / O(n&#xB2;) / O(n&#xB2;)</text>
  <text x="320" y="154" fill="#555" font-size="11">Space: O(1) | Stable: Yes</text>
  <text x="320" y="174" fill="#2e7d32" font-size="11" font-weight="bold">Use when: small arrays (n &lt; 20), nearly</text>
  <text x="320" y="188" fill="#2e7d32" font-size="11" font-weight="bold">sorted data, base case in std::sort</text>

  <!-- Selection -->
  <rect x="600" y="98" width="280" height="100" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="1"/>
  <text x="740" y="118" text-anchor="middle" fill="#c62828" font-size="14" font-weight="bold">Selection Sort</text>
  <text x="610" y="138" fill="#555" font-size="11">Best/Avg/Worst: O(n&#xB2;) / O(n&#xB2;) / O(n&#xB2;)</text>
  <text x="610" y="154" fill="#555" font-size="11">Space: O(1) | Stable: No</text>
  <text x="610" y="174" fill="#2e7d32" font-size="11" font-weight="bold">Use when: minimizing writes (flash</text>
  <text x="610" y="188" fill="#2e7d32" font-size="11" font-weight="bold">memory, EEPROM) &#x2014; only n-1 swaps</text>

  <!-- O(n log n) header -->
  <rect x="20" y="210" width="860" height="26" rx="6" fill="#1b5e20"/>
  <text x="450" y="229" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">O(n log n) Efficient Sorts &#x2014; divide-and-conquer, scales to millions</text>

  <!-- Merge -->
  <rect x="20" y="240" width="280" height="116" rx="8" fill="#e8f5e9" stroke="#1b5e20" stroke-width="1"/>
  <text x="160" y="260" text-anchor="middle" fill="#1b5e20" font-size="14" font-weight="bold">Merge Sort</text>
  <text x="30" y="280" fill="#555" font-size="11">Best/Avg/Worst: O(n log n) always</text>
  <text x="30" y="296" fill="#555" font-size="11">Space: O(n) | Stable: Yes</text>
  <text x="30" y="316" fill="#2e7d32" font-size="11" font-weight="bold">Use when: stability required, guaranteed</text>
  <text x="30" y="330" fill="#2e7d32" font-size="11" font-weight="bold">performance needed, linked lists, external</text>
  <text x="30" y="344" fill="#2e7d32" font-size="11" font-weight="bold">sorting (files too big for memory)</text>

  <!-- Quick -->
  <rect x="310" y="240" width="280" height="116" rx="8" fill="#e8f5e9" stroke="#1b5e20" stroke-width="1"/>
  <text x="450" y="260" text-anchor="middle" fill="#1b5e20" font-size="14" font-weight="bold">Quick Sort</text>
  <text x="320" y="280" fill="#555" font-size="11">Best/Avg/Worst: O(n log n) / O(n log n) / O(n&#xB2;)</text>
  <text x="320" y="296" fill="#555" font-size="11">Space: O(log n) | Stable: No</text>
  <text x="320" y="316" fill="#2e7d32" font-size="11" font-weight="bold">Use when: general-purpose sorting, large</text>
  <text x="320" y="330" fill="#2e7d32" font-size="11" font-weight="bold">arrays in memory (cache-friendly). C++</text>
  <text x="320" y="344" fill="#2e7d32" font-size="11" font-weight="bold">std::sort uses this (introsort variant)</text>

  <!-- Heap -->
  <rect x="600" y="240" width="280" height="116" rx="8" fill="#e8f5e9" stroke="#1b5e20" stroke-width="1"/>
  <text x="740" y="260" text-anchor="middle" fill="#1b5e20" font-size="14" font-weight="bold">Heap Sort</text>
  <text x="610" y="280" fill="#555" font-size="11">Best/Avg/Worst: O(n log n) always</text>
  <text x="610" y="296" fill="#555" font-size="11">Space: O(1) | Stable: No</text>
  <text x="610" y="316" fill="#2e7d32" font-size="11" font-weight="bold">Use when: guaranteed O(n log n) with no</text>
  <text x="610" y="330" fill="#2e7d32" font-size="11" font-weight="bold">extra memory. Priority queues (Dijkstra).</text>
  <text x="610" y="344" fill="#2e7d32" font-size="11" font-weight="bold">Fallback in introsort when quick degrades</text>

  <!-- O(n+k) header -->
  <rect x="20" y="368" width="860" height="26" rx="6" fill="#4a148c"/>
  <text x="450" y="387" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">O(n+k) Non-Comparison Sorts &#x2014; integers only, near-linear time</text>

  <!-- Counting -->
  <rect x="20" y="398" width="280" height="116" rx="8" fill="#f3e5f5" stroke="#4a148c" stroke-width="1"/>
  <text x="160" y="418" text-anchor="middle" fill="#4a148c" font-size="14" font-weight="bold">Counting Sort</text>
  <text x="30" y="438" fill="#555" font-size="11">Best/Avg/Worst: O(n+k) always</text>
  <text x="30" y="454" fill="#555" font-size="11">Space: O(k) | Stable: Yes</text>
  <text x="30" y="470" fill="#555" font-size="11">k = value range (max - min + 1)</text>
  <text x="30" y="490" fill="#2e7d32" font-size="11" font-weight="bold">Use when: small integer range &#x2014; exam</text>
  <text x="30" y="504" fill="#2e7d32" font-size="11" font-weight="bold">scores (0-100), ages, rating stars (1-5)</text>

  <!-- Bucket -->
  <rect x="310" y="398" width="280" height="116" rx="8" fill="#f3e5f5" stroke="#4a148c" stroke-width="1"/>
  <text x="450" y="418" text-anchor="middle" fill="#4a148c" font-size="14" font-weight="bold">Bucket Sort</text>
  <text x="320" y="438" fill="#555" font-size="11">Best/Avg/Worst: O(n+k) / O(n+k) / O(n&#xB2;)</text>
  <text x="320" y="454" fill="#555" font-size="11">Space: O(n+k) | Stable: Depends</text>
  <text x="320" y="470" fill="#555" font-size="11">k = number of buckets (you choose)</text>
  <text x="320" y="490" fill="#2e7d32" font-size="11" font-weight="bold">Use when: uniformly distributed integers</text>
  <text x="320" y="504" fill="#2e7d32" font-size="11" font-weight="bold">over a known range. Not good for clustered data</text>

  <!-- Radix -->
  <rect x="600" y="398" width="280" height="116" rx="8" fill="#f3e5f5" stroke="#4a148c" stroke-width="1"/>
  <text x="740" y="418" text-anchor="middle" fill="#4a148c" font-size="14" font-weight="bold">Radix Sort</text>
  <text x="610" y="438" fill="#555" font-size="11">Best/Avg/Worst: O(d(n+k)) always</text>
  <text x="610" y="454" fill="#555" font-size="11">Space: O(n+k) | Stable: Yes</text>
  <text x="610" y="470" fill="#555" font-size="11">d = digits, k = base (10)</text>
  <text x="610" y="490" fill="#2e7d32" font-size="11" font-weight="bold">Use when: large range but few digits &#x2014;</text>
  <text x="610" y="504" fill="#2e7d32" font-size="11" font-weight="bold">phone numbers, ZIP codes, employee IDs</text>

  <!-- Quick decision guide -->
  <rect x="20" y="530" width="860" height="238" rx="10" fill="#f4f6f7" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="450" y="556" text-anchor="middle" fill="#333" font-size="16" font-weight="bold">Quick Decision Guide</text>

  <text x="40" y="582" fill="#333" font-size="12" font-weight="bold">1. What type of data?</text>
  <text x="60" y="600" fill="#555" font-size="12">Strings, floats, objects &#x2192; <tspan fill="#1b5e20" font-weight="bold">comparison sort</tspan> (quick sort for speed, merge sort for stability)</text>
  <text x="60" y="618" fill="#555" font-size="12">Integers with known range &#x2192; consider non-comparison sorts (step 2)</text>

  <text x="40" y="642" fill="#333" font-size="12" font-weight="bold">2. How big is n?</text>
  <text x="60" y="660" fill="#555" font-size="12">n &lt; 20 &#x2192; <tspan fill="#c62828" font-weight="bold">insertion sort</tspan> (simple, fast on tiny arrays, used by std::sort internally)</text>
  <text x="60" y="678" fill="#555" font-size="12">n &gt; 20 &#x2192; continue to step 3</text>

  <text x="40" y="702" fill="#333" font-size="12" font-weight="bold">3. Integer data: how big is the value range k?</text>
  <text x="60" y="720" fill="#555" font-size="12">k is small (under ~10,000) &#x2192; <tspan fill="#4a148c" font-weight="bold">counting sort</tspan></text>
  <text x="60" y="738" fill="#555" font-size="12">k is large but few digits &#x2192; <tspan fill="#4a148c" font-weight="bold">radix sort</tspan></text>
  <text x="60" y="756" fill="#555" font-size="12">Uniformly distributed &#x2192; <tspan fill="#4a148c" font-weight="bold">bucket sort</tspan></text>
  <text x="500" y="738" fill="#555" font-size="12">k is huge and not integer &#x2192; <tspan fill="#1b5e20" font-weight="bold">quick sort</tspan> or <tspan fill="#1b5e20" font-weight="bold">merge sort</tspan></text>
</svg>
