<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 544" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <text x="450" y="28" text-anchor="middle" fill="#1a1a1a" font-size="20" font-weight="bold">Radix Sort &#x2014; Step 0 + Pass 1 Detail</text>
  <text x="450" y="48" text-anchor="middle" fill="#777" font-size="12">NonComparisonSorts.cpp::radix_sort() &#x2014; determine d and k, then first pass on ones digit</text>

  <!-- Variable key (left, above code) -->
  <rect x="20" y="64" width="390" height="82" rx="8" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
  <text x="35" y="82" fill="#333" font-size="11" font-weight="bold">Variable Key</text>
  <rect x="35" y="88" width="10" height="10" rx="2" fill="#0d47a1"/>
  <text x="50" y="98" fill="#555" font-size="10"><tspan font-weight="bold">n</tspan> = number of elements (8)</text>
  <rect x="210" y="88" width="10" height="10" rx="2" fill="#c62828"/>
  <text x="225" y="98" fill="#555" font-size="10"><tspan font-weight="bold">max_val</tspan> = largest value (802)</text>
  <rect x="35" y="104" width="10" height="10" rx="2" fill="#e65100"/>
  <text x="50" y="114" fill="#555" font-size="10"><tspan font-weight="bold">d</tspan> = digits in max (3 passes)</text>
  <rect x="210" y="104" width="10" height="10" rx="2" fill="#6a1b9a"/>
  <text x="225" y="114" fill="#555" font-size="10"><tspan font-weight="bold">k</tspan> = base = 10 (digits 0-9, always 10)</text>
  <rect x="35" y="120" width="10" height="10" rx="2" fill="#2e7d32"/>
  <text x="50" y="130" fill="#555" font-size="10"><tspan font-weight="bold">exp</tspan> = digit position (1, 10, 100...)</text>
  <rect x="210" y="120" width="10" height="10" rx="2" fill="#f39c12"/>
  <text x="225" y="130" fill="#555" font-size="10"><tspan font-weight="bold">digit</tspan> = (value / exp) % 10</text>

  <!-- Code block (left) -->
  <rect x="20" y="154" width="390" height="280" rx="8" fill="#1e1e2e" stroke="#45475a" stroke-width="1.5"/>

  <rect x="20" y="160" width="390" height="36" fill="#89b4fa18"/>
  <text x="35" y="178" fill="#89b4fa" font-size="11" font-weight="bold">Step 0: Find max, determine d O(n)</text>
  <text x="35" y="194" fill="#cdd6f4" font-size="11"><tspan fill="#cba6f7">int</tspan> max_val = *max_element(...);</text>

  <rect x="20" y="208" width="390" height="42" fill="#a6e3a118"/>
  <text x="35" y="224" fill="#a6e3a1" font-size="11" font-weight="bold">Main loop: one pass per digit</text>
  <text x="35" y="242" fill="#cdd6f4" font-size="11"><tspan fill="#cba6f7">for</tspan> (exp = <tspan fill="#fab387">1</tspan>; max_val/exp &gt; <tspan fill="#fab387">0</tspan>; exp *= <tspan fill="#fab387">10</tspan>)</text>

  <rect x="20" y="256" width="390" height="140" fill="#f38ba818"/>
  <text x="35" y="272" fill="#f38ba8" font-size="11" font-weight="bold">counting_sort_by_digit(data, exp):</text>
  <text x="35" y="290" fill="#6c7086" font-size="11" font-style="italic">// Extract digit at current position</text>
  <text x="35" y="306" fill="#cdd6f4" font-size="11"><tspan fill="#cba6f7">int</tspan> digit = (data[i] / exp) % <tspan fill="#fab387">10</tspan>;</text>
  <text x="35" y="326" fill="#6c7086" font-size="11" font-style="italic">// Count digits, build cumulative, place backwards</text>
  <text x="35" y="344" fill="#cdd6f4" font-size="11">count[digit]++;           <tspan fill="#6c7086">// tally</tspan></text>
  <text x="35" y="362" fill="#cdd6f4" font-size="11">count[i] += count[i-<tspan fill="#fab387">1</tspan>];  <tspan fill="#6c7086">// cumulative</tspan></text>
  <text x="35" y="380" fill="#cdd6f4" font-size="11">output[count[digit]-<tspan fill="#fab387">1</tspan>] = data[i]; <tspan fill="#6c7086">// place</tspan></text>
  <text x="35" y="396" fill="#cdd6f4" font-size="11">count[digit]--;           <tspan fill="#6c7086">// next slot</tspan></text>

  <text x="35" y="422" fill="#6c7086" font-size="11" font-style="italic">// k = 10 (digits 0-9). Always 10 slots.</text>

  <!-- Right panel -->
  <text x="420" y="82" fill="#6a1b9a" font-size="13" font-weight="bold">Input: [170, 45, 75, 90, 802, 24, 2, 66]</text>

  <!-- Step 0 -->
  <rect x="420" y="96" width="460" height="44" rx="6" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1"/>
  <text x="430" y="116" fill="#6a1b9a" font-size="12" font-weight="bold">Step 0: max = 802</text>
  <text x="430" y="132" fill="#555" font-size="11">d = 3 digits (ones, tens, hundreds) | k = 10 (base 10, digits 0-9)</text>

  <!-- Pass 1 detail -->
  <rect x="420" y="148" width="460" height="290" rx="6" fill="#ede7f6" stroke="#9b59b6" stroke-width="1"/>
  <text x="430" y="168" fill="#6a1b9a" font-size="12" font-weight="bold">Pass 1 (exp=1): Sort by ones digit</text>
  <text x="430" y="186" fill="#555" font-size="11" font-weight="bold">digit = value % 10</text>

  <!-- Element-by-element digit extraction -->
  <text x="430" y="208" fill="#555" font-size="10" font-weight="bold">Element</text>
  <text x="510" y="208" fill="#555" font-size="10" font-weight="bold">Ones digit</text>

  <text x="430" y="226" fill="#1565c0" font-size="11">17<tspan fill="#e74c3c" font-weight="bold">0</tspan></text>
  <text x="510" y="226" fill="#555" font-size="11">170 % 10 = <tspan fill="#e74c3c" font-weight="bold">0</tspan></text>
  <text x="630" y="226" fill="#1565c0" font-size="11">4<tspan fill="#e74c3c" font-weight="bold">5</tspan></text>
  <text x="680" y="226" fill="#555" font-size="11">45 % 10 = <tspan fill="#e74c3c" font-weight="bold">5</tspan></text>

  <text x="430" y="246" fill="#1565c0" font-size="11">7<tspan fill="#e74c3c" font-weight="bold">5</tspan></text>
  <text x="510" y="246" fill="#555" font-size="11">75 % 10 = <tspan fill="#e74c3c" font-weight="bold">5</tspan></text>
  <text x="630" y="246" fill="#1565c0" font-size="11">9<tspan fill="#e74c3c" font-weight="bold">0</tspan></text>
  <text x="680" y="246" fill="#555" font-size="11">90 % 10 = <tspan fill="#e74c3c" font-weight="bold">0</tspan></text>

  <text x="430" y="266" fill="#1565c0" font-size="11">80<tspan fill="#e74c3c" font-weight="bold">2</tspan></text>
  <text x="510" y="266" fill="#555" font-size="11">802 % 10 = <tspan fill="#e74c3c" font-weight="bold">2</tspan></text>
  <text x="630" y="266" fill="#1565c0" font-size="11">2<tspan fill="#e74c3c" font-weight="bold">4</tspan></text>
  <text x="680" y="266" fill="#555" font-size="11">24 % 10 = <tspan fill="#e74c3c" font-weight="bold">4</tspan></text>

  <text x="430" y="286" fill="#1565c0" font-size="11"><tspan fill="#e74c3c" font-weight="bold">2</tspan></text>
  <text x="510" y="286" fill="#555" font-size="11">2 % 10 = <tspan fill="#e74c3c" font-weight="bold">2</tspan></text>
  <text x="630" y="286" fill="#1565c0" font-size="11">6<tspan fill="#e74c3c" font-weight="bold">6</tspan></text>
  <text x="680" y="286" fill="#555" font-size="11">66 % 10 = <tspan fill="#e74c3c" font-weight="bold">6</tspan></text>

  <!-- Count array -->
  <text x="430" y="310" fill="#555" font-size="10" font-weight="bold">count[0..9]:</text>
  <text x="530" y="310" fill="#888" font-size="10">[2, 0, 2, 0, 1, 2, 1, 0, 0, 0]</text>
  <text x="430" y="326" fill="#555" font-size="10" font-weight="bold">Digits in order:</text>
  <text x="540" y="326" fill="#888" font-size="10">0, 0, 2, 2, 4, 5, 5, 6</text>

  <!-- Result -->
  <text x="430" y="380" fill="#27ae60" font-size="11" font-weight="bold">After Pass 1:</text>
  <rect x="550" y="368" width="34" height="18" rx="3" fill="#9b59b6"/><text x="567" y="382" text-anchor="middle" fill="#fff" font-size="9">170</text>
  <rect x="588" y="368" width="30" height="18" rx="3" fill="#9b59b6"/><text x="603" y="382" text-anchor="middle" fill="#fff" font-size="9">90</text>
  <rect x="622" y="368" width="34" height="18" rx="3" fill="#9b59b6"/><text x="639" y="382" text-anchor="middle" fill="#fff" font-size="9">802</text>
  <rect x="660" y="368" width="24" height="18" rx="3" fill="#9b59b6"/><text x="672" y="382" text-anchor="middle" fill="#fff" font-size="9">2</text>
  <rect x="688" y="368" width="30" height="18" rx="3" fill="#9b59b6"/><text x="703" y="382" text-anchor="middle" fill="#fff" font-size="9">24</text>
  <rect x="722" y="368" width="30" height="18" rx="3" fill="#9b59b6"/><text x="737" y="382" text-anchor="middle" fill="#fff" font-size="9">45</text>
  <rect x="756" y="368" width="30" height="18" rx="3" fill="#9b59b6"/><text x="771" y="382" text-anchor="middle" fill="#fff" font-size="9">75</text>
  <rect x="790" y="368" width="30" height="18" rx="3" fill="#9b59b6"/><text x="805" y="382" text-anchor="middle" fill="#fff" font-size="9">66</text>

  <text x="430" y="424" fill="#888" font-size="10">Ones digits sorted: 0, 0, 2, 2, 4, 5, 5, 6. Other digits still scrambled -- that is OK.</text>

  <!-- Key insight -->
  <rect x="20" y="450" width="860" height="36" rx="10" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="450" y="474" text-anchor="middle" fill="#333" font-size="12">After Pass 1, elements are sorted by ones digit only. Passes 2-3 will sort by tens and hundreds, and <tspan font-weight="bold">stability preserves</tspan> earlier ordering.</text>

  <rect x="20" y="496" width="860" height="36" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="450" y="520" text-anchor="middle" fill="#1565c0" font-size="13" font-weight="bold">&#x2192; Continues in: Radix Sort Passes 2-3 (Stability in Action)</text>
</svg>
