<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 536" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <text x="450" y="28" text-anchor="middle" fill="#1a1a1a" font-size="20" font-weight="bold">Bucket Sort &#x2014; Steps 1a, 1b (Distribution Phase)</text>
  <text x="450" y="48" text-anchor="middle" fill="#777" font-size="12">NonComparisonSorts.cpp::bucket_sort() &#x2014; find range, compute buckets, distribute elements</text>

  <!-- Variable key (left, above code) -->
  <rect x="20" y="64" width="380" height="90" rx="8" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
  <text x="35" y="82" fill="#333" font-size="11" font-weight="bold">Variable Key</text>
  <rect x="35" y="88" width="10" height="10" rx="2" fill="#0d47a1"/>
  <text x="50" y="98" fill="#555" font-size="10"><tspan font-weight="bold">n</tspan> = number of elements</text>
  <rect x="200" y="88" width="10" height="10" rx="2" fill="#2e7d32"/>
  <text x="215" y="98" fill="#555" font-size="10"><tspan font-weight="bold">min_val</tspan> = smallest (5)</text>
  <rect x="35" y="104" width="10" height="10" rx="2" fill="#c62828"/>
  <text x="50" y="114" fill="#555" font-size="10"><tspan font-weight="bold">max_val</tspan> = largest (91)</text>
  <rect x="200" y="104" width="10" height="10" rx="2" fill="#e65100"/>
  <text x="215" y="114" fill="#555" font-size="10"><tspan font-weight="bold">num_buckets</tspan> = 3 (programmer chooses)</text>
  <rect x="35" y="120" width="10" height="10" rx="2" fill="#6a1b9a"/>
  <text x="50" y="130" fill="#555" font-size="10"><tspan font-weight="bold">range_per_bucket</tspan> = ceil(range / num_buckets)</text>
  <rect x="35" y="136" width="10" height="10" rx="2" fill="#f39c12"/>
  <text x="50" y="146" fill="#555" font-size="10"><tspan font-weight="bold">bucket_idx</tspan> = (val - min) / range_per_bucket</text>

  <!-- Code block (left) -->
  <rect x="20" y="162" width="380" height="260" rx="8" fill="#1e1e2e" stroke="#45475a" stroke-width="1.5"/>

  <rect x="20" y="170" width="380" height="72" fill="#89b4fa18"/>
  <text x="35" y="186" fill="#89b4fa" font-size="11" font-weight="bold">Step 1a: Find range, compute buckets O(n)</text>
  <text x="35" y="204" fill="#cdd6f4" font-size="11"><tspan fill="#cba6f7">int</tspan> min_val = *min_element(...);</text>
  <text x="35" y="220" fill="#cdd6f4" font-size="11"><tspan fill="#cba6f7">int</tspan> max_val = *max_element(...);</text>
  <text x="35" y="236" fill="#cdd6f4" font-size="11"><tspan fill="#cba6f7">int</tspan> range_per_bucket = ceil(range / num_buckets);</text>

  <!-- Edge case guards -->
  <rect x="20" y="244" width="380" height="40" fill="#f38ba820"/>
  <text x="35" y="260" fill="#f38ba8" font-size="11" font-weight="bold">Edge case guards:</text>
  <text x="35" y="276" fill="#cdd6f4" font-size="11"><tspan fill="#cba6f7">if</tspan> (data.size() &lt;= <tspan fill="#fab387">1</tspan>) <tspan fill="#cba6f7">return</tspan>;</text>
  <text x="35" y="292" fill="#cdd6f4" font-size="11"><tspan fill="#cba6f7">if</tspan> (min_val == max_val) <tspan fill="#cba6f7">return</tspan>; <tspan fill="#6c7086">// range=0</tspan></text>

  <rect x="20" y="300" width="380" height="60" fill="#a6e3a118"/>
  <text x="35" y="316" fill="#a6e3a1" font-size="11" font-weight="bold">Step 1b: Distribute into buckets O(n)</text>
  <text x="35" y="334" fill="#cdd6f4" font-size="11"><tspan fill="#cba6f7">for</tspan> (<tspan fill="#cba6f7">int</tspan> val : data) {</text>
  <text x="50" y="352" fill="#cdd6f4" font-size="11"><tspan fill="#cba6f7">int</tspan> idx = (val - min_val) / range_per_bucket;</text>
  <text x="50" y="368" fill="#cdd6f4" font-size="11">buckets[idx].push_back(val);</text>

  <text x="35" y="398" fill="#6c7086" font-size="11" font-style="italic">// num_buckets chosen by programmer (here: 3)</text>
  <text x="35" y="414" fill="#6c7086" font-size="11" font-style="italic">// Integer division maps value to bucket index</text>

  <!-- Right panel -->
  <text x="420" y="82" fill="#1565c0" font-size="13" font-weight="bold">Input: [42, 15, 73, 28, 91, 5]</text>

  <!-- 1a result -->
  <rect x="420" y="96" width="460" height="36" rx="6" fill="#eaf4fb" stroke="#5dade2" stroke-width="1"/>
  <text x="430" y="114" fill="#2980b9" font-size="11" font-weight="bold">1a: range_per_bucket = ceil((91-5+1) / 3) = ceil(87/3) = <tspan fill="#c62828">29</tspan></text>
  <text x="760" y="114" fill="#888" font-size="10">[5-33] [34-62] [63-91]</text>

  <!-- Edge cases -->
  <rect x="420" y="138" width="460" height="56" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1"/>
  <text x="430" y="156" fill="#c62828" font-size="11" font-weight="bold">Edge cases (checked before distribution):</text>
  <text x="430" y="172" fill="#555" font-size="10">&#x2022; size &lt;= 1: nothing to sort, return early</text>
  <text x="430" y="186" fill="#555" font-size="10">&#x2022; min == max: all values identical, range = 0 &#x2192; divide-by-zero in bucket formula. Return early.</text>

  <!-- 1b distribution table -->
  <rect x="420" y="202" width="460" height="210" rx="6" fill="#fef9e7" stroke="#e67e22" stroke-width="1"/>
  <text x="430" y="222" fill="#e67e22" font-size="12" font-weight="bold">1b: Distribute each element</text>

  <!-- Column headers -->
  <text x="430" y="242" fill="#555" font-size="10" font-weight="bold">Element</text>
  <text x="500" y="242" fill="#555" font-size="10" font-weight="bold">(val - min) / range_per_bucket</text>
  <text x="730" y="242" fill="#555" font-size="10" font-weight="bold">Bucket</text>

  <text x="430" y="262" fill="#1565c0" font-size="11" font-weight="bold">42</text>
  <text x="500" y="262" fill="#555" font-size="11">(42 - 5) / 29 = 37 / 29 = <tspan fill="#e65100" font-weight="bold">1</tspan></text>
  <text x="730" y="262" fill="#e65100" font-size="11">B1 (34-62)</text>

  <text x="430" y="282" fill="#1565c0" font-size="11" font-weight="bold">15</text>
  <text x="500" y="282" fill="#555" font-size="11">(15 - 5) / 29 = 10 / 29 = <tspan fill="#e65100" font-weight="bold">0</tspan></text>
  <text x="730" y="282" fill="#e65100" font-size="11">B0 (5-33)</text>

  <text x="430" y="302" fill="#1565c0" font-size="11" font-weight="bold">73</text>
  <text x="500" y="302" fill="#555" font-size="11">(73 - 5) / 29 = 68 / 29 = <tspan fill="#e65100" font-weight="bold">2</tspan></text>
  <text x="730" y="302" fill="#e65100" font-size="11">B2 (63-91)</text>

  <text x="430" y="322" fill="#1565c0" font-size="11" font-weight="bold">28</text>
  <text x="500" y="322" fill="#555" font-size="11">(28 - 5) / 29 = 23 / 29 = <tspan fill="#e65100" font-weight="bold">0</tspan></text>
  <text x="730" y="322" fill="#e65100" font-size="11">B0</text>

  <text x="430" y="342" fill="#1565c0" font-size="11" font-weight="bold">91</text>
  <text x="500" y="342" fill="#555" font-size="11">(91 - 5) / 29 = 86 / 29 = <tspan fill="#e65100" font-weight="bold">2</tspan></text>
  <text x="730" y="342" fill="#e65100" font-size="11">B2</text>

  <text x="430" y="362" fill="#1565c0" font-size="11" font-weight="bold">5</text>
  <text x="500" y="362" fill="#555" font-size="11">(5 - 5) / 29 = 0 / 29 = <tspan fill="#e65100" font-weight="bold">0</tspan></text>
  <text x="730" y="362" fill="#e65100" font-size="11">B0</text>

  <!-- Bucket state -->
  <text x="430" y="398" fill="#1565c0" font-size="11" font-weight="bold">B0: [15, 28, 5]</text>
  <text x="600" y="398" fill="#1565c0" font-size="11" font-weight="bold">B1: [42]</text>
  <text x="720" y="398" fill="#1565c0" font-size="11" font-weight="bold">B2: [73, 91]</text>

  <!-- Key insight -->
  <rect x="20" y="428" width="860" height="50" rx="10" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="450" y="458" text-anchor="middle" fill="#333" font-size="12">After distribution: each bucket contains elements within its value range. Buckets are <tspan font-weight="bold">unsorted internally</tspan>.</text>

  <rect x="20" y="492" width="860" height="36" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="450" y="516" text-anchor="middle" fill="#1565c0" font-size="13" font-weight="bold">&#x2192; Continues in: Bucket Sort Steps 2-3 (Sort + Concatenate)</text>
</svg>
